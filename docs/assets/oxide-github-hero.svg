<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Oxide Enterprise PDF SDK command center</title>
  <desc id="desc">A modern dashboard-style banner showing a PDF workflow from parse to author, edit, sign, validate, and self-hosted deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#17202a"/>
      <stop offset="1" stop-color="#f4efe8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16212d" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#273342" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d98f45"/>
      <stop offset="1" stop-color="#f4c27f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label{font:700 38px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc;letter-spacing:.2px}
      .small{font:600 17px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .tiny{font:600 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#94a3b8}
      .chip{font:700 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}
      .line{stroke:#334155;stroke-width:2}
      .flow{stroke:url(#teal);stroke-width:5;stroke-linecap:round;stroke-dasharray:14 18;animation:dash 5s linear infinite}
      .pulse{animation:pulse 2.8s ease-in-out infinite}
      .float1{animation:float1 6s ease-in-out infinite}
      .float2{animation:float2 7s ease-in-out infinite}
      .float3{animation:float3 8s ease-in-out infinite}
      @keyframes dash{to{stroke-dashoffset:-128}}
      @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
      @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
      @keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    </style>
  </defs>

  <rect width="1600" height="520" rx="36" fill="url(#bg)"/>
  <circle cx="1240" cy="70" r="250" fill="#2dd4bf" opacity="0.08"/>
  <circle cx="140" cy="455" r="240" fill="#d98f45" opacity="0.11"/>
  <path d="M0 420 C260 330 365 495 620 390 C840 300 900 170 1150 230 C1320 270 1405 210 1600 140 L1600 520 L0 520 Z" fill="#f8fafc" opacity="0.07"/>

  <g filter="url(#shadow)">
    <rect x="96" y="80" width="420" height="330" rx="28" fill="url(#panel)" stroke="#334155"/>
    <rect x="126" y="112" width="82" height="104" rx="12" fill="#f8fafc"/>
    <rect x="145" y="136" width="44" height="8" rx="4" fill="#d98f45"/>
    <rect x="145" y="158" width="36" height="6" rx="3" fill="#94a3b8"/>
    <rect x="145" y="178" width="46" height="6" rx="3" fill="#94a3b8"/>
    <path d="M208 112 L208 154 L250 154" fill="#e2e8f0"/>
    <path d="M208 112 L250 154" stroke="#cbd5e1" stroke-width="2"/>
    <text x="284" y="148" class="label">Oxide</text>
    <text x="285" y="178" class="small">Pure-Rust PDF SDK</text>
    <rect x="126" y="252" width="350" height="44" rx="12" fill="#0f172a" stroke="#263244"/>
    <text x="148" y="280" class="tiny">cargo build --release -p oxide-cli</text>
    <rect x="126" y="314" width="148" height="36" rx="18" fill="url(#copper)"/>
    <text x="155" y="337" class="chip">single binary</text>
    <rect x="286" y="314" width="190" height="36" rx="18" fill="url(#teal)"/>
    <text x="323" y="337" class="chip">self-hostable</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="585" y="78" width="670" height="332" rx="30" fill="#101923" opacity=".94" stroke="#334155"/>
    <text x="625" y="124" class="small">workflow command center</text>
    <path class="flow" d="M672 252 C790 185 894 185 1008 252 S1195 320 1217 252"/>

    <g class="float1">
      <rect x="628" y="184" width="128" height="116" rx="18" fill="#1f2937" stroke="#475569"/>
      <circle cx="692" cy="222" r="26" fill="#0f766e"/>
      <path d="M680 222 l9 9 19-22" fill="none" stroke="#99f6e4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="664" y="273" class="small">Parse</text>
    </g>

    <g class="float2">
      <rect x="790" y="154" width="128" height="146" rx="18" fill="#1f2937" stroke="#475569"/>
      <rect x="822" y="184" width="62" height="76" rx="8" fill="#f8fafc"/>
      <rect x="836" y="204" width="34" height="6" rx="3" fill="#d98f45"/>
      <rect x="836" y="223" width="28" height="5" rx="2.5" fill="#94a3b8"/>
      <text x="828" y="283" class="small">Create</text>
    </g>

    <g class="float3">
      <rect x="952" y="184" width="128" height="116" rx="18" fill="#1f2937" stroke="#475569"/>
      <path d="M995 224 h42 M995 244 h42" stroke="#93c5fd" stroke-width="7" stroke-linecap="round"/>
      <circle cx="1028" cy="236" r="38" fill="#60a5fa" opacity=".12"/>
      <text x="992" y="273" class="small">Edit</text>
    </g>

    <g class="float1">
      <rect x="1114" y="154" width="106" height="146" rx="18" fill="#1f2937" stroke="#475569"/>
      <path d="M1167 184 l38 18 v30 c0 29-17 45-38 56-21-11-38-27-38-56v-30z" fill="#d98f45" opacity=".92"/>
      <path d="M1152 232 l11 12 22-28" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="1140" y="283" class="small">Sign</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1320" y="96" width="184" height="280" rx="26" fill="#f8fafc" opacity=".95"/>
    <text x="1354" y="140" fill="#0f172a" style="font:800 28px ui-sans-serif,system-ui">GA Ready</text>
    <rect x="1352" y="170" width="112" height="26" rx="13" fill="#ccfbf1"/>
    <text x="1371" y="188" fill="#115e59" style="font:800 13px ui-sans-serif,system-ui">qpdf clean</text>
    <rect x="1352" y="212" width="124" height="26" rx="13" fill="#dbeafe"/>
    <text x="1367" y="230" fill="#1e3a8a" style="font:800 13px ui-sans-serif,system-ui">veraPDF pass</text>
    <rect x="1352" y="254" width="96" height="26" rx="13" fill="#ffedd5"/>
    <text x="1367" y="272" fill="#7c2d12" style="font:800 13px ui-sans-serif,system-ui">fuzzed</text>
    <rect x="1352" y="296" width="116" height="26" rx="13" fill="#dcfce7"/>
    <text x="1368" y="314" fill="#14532d" style="font:800 13px ui-sans-serif,system-ui">self-host</text>
  </g>

  <g class="pulse" filter="url(#glow)">
    <circle cx="586" cy="250" r="7" fill="#2dd4bf"/>
    <circle cx="1255" cy="250" r="7" fill="#2dd4bf"/>
  </g>
</svg>
