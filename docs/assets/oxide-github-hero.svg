<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Oxide pure-Rust PDF SDK brutalist workflow banner</title>
  <desc id="desc">A high-contrast brutalist banner with document slabs, terminal blocks, validation rails, and self-hosted infrastructure shapes.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#2a2a2a" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.5" fill="#f2eadc" opacity=".35"/>
    </pattern>
    <pattern id="halftone" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#111"/>
    </pattern>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#18d6c4"/>
    </linearGradient>
    <filter id="hard-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="16" dy="18" stdDeviation="0" flood-color="#000" flood-opacity=".72"/>
    </filter>
    <style>
      .bg{fill:#090909}
      .paper{fill:#f1eadc}
      .ink{fill:#090909}
      .oxide{fill:#c26a2d}
      .cyan{fill:#00f0ff}
      .stroke-paper{stroke:#f1eadc;stroke-width:3}
      .stroke-ink{stroke:#090909;stroke-width:5}
      .stroke-oxide{stroke:#c26a2d;stroke-width:5}
      .stroke-cyan{stroke:#00f0ff;stroke-width:4}
      .title{font:900 118px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:-8px}
      .sub{font:800 28px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:2px}
      .mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .tiny{font:700 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .rail{stroke:url(#cyan);stroke-width:6;stroke-linecap:square;stroke-dasharray:30 18;animation:rail 4.8s linear infinite}
      .pulse{animation:pulse 2.4s steps(2,end) infinite}
      .jitter{animation:jitter 5.2s steps(2,end) infinite}
      @keyframes rail{to{stroke-dashoffset:-192}}
      @keyframes pulse{50%{opacity:.38}}
      @keyframes jitter{50%{transform:translate(4px,-2px)}}
    </style>
  </defs>

  <rect width="1600" height="520" class="bg"/>
  <rect width="1600" height="520" fill="url(#grid)" opacity=".88"/>

  <path d="M0 0H706L788 70H1600V0Z" class="paper" opacity=".96"/>
  <path d="M0 520H465L569 438H1600V520Z" class="paper" opacity=".08"/>
  <path d="M1088 0H1600L1480 146H1214Z" class="paper"/>
  <path d="M1060 0H1115L980 190H925Z" class="oxide"/>
  <path d="M692 520H812L1197 154H1077Z" class="oxide"/>
  <path d="M780 520H926L1324 140H1178Z" class="paper"/>
  <path d="M930 520H1000L1398 140H1328Z" fill="#171717"/>

  <g filter="url(#hard-shadow)">
    <rect x="50" y="58" width="92" height="92" class="oxide"/>
    <rect x="76" y="84" width="40" height="40" class="bg"/>
    <text x="48" y="286" class="title paper">OXIDE</text>
    <text x="56" y="352" class="sub oxide">PURE-RUST PDF SDK</text>
    <line x1="54" y1="386" x2="532" y2="386" class="stroke-paper" opacity=".7"/>
  </g>

  <g transform="translate(50 414)">
    <rect width="424" height="70" fill="none" class="stroke-paper"/>
    <path d="M0 0H24M400 0H424M0 70H24M400 70H424" class="stroke-oxide"/>
    <text x="22" y="30" class="mono cyan">$ oxide pipeline run ./pdfs/*.pdf</text>
    <text x="22" y="56" class="tiny paper">&gt; parse &gt; author &gt; edit &gt; sign &gt; verify</text>
  </g>

  <g class="jitter" filter="url(#hard-shadow)">
    <path d="M602 204H792L850 262V420H602Z" class="paper"/>
    <path d="M792 204V262H850" fill="#d8d0c0"/>
    <rect x="636" y="254" width="142" height="14" class="ink"/>
    <rect x="636" y="292" width="170" height="8" class="ink" opacity=".75"/>
    <rect x="636" y="320" width="138" height="8" class="ink" opacity=".75"/>
    <rect x="636" y="348" width="92" height="8" class="ink" opacity=".75"/>
    <rect x="746" y="360" width="32" height="32" class="ink"/>
    <rect x="786" y="360" width="32" height="32" class="oxide"/>
    <rect x="746" y="398" width="32" height="12" class="ink"/>
    <rect x="786" y="398" width="32" height="12" class="ink"/>
    <text x="636" y="242" class="sub ink">PDF</text>
  </g>

  <path class="rail" d="M790 436L1064 332L1262 330L1440 198"/>
  <path class="rail" d="M828 470L1115 376L1300 376L1500 238" opacity=".75"/>
  <circle cx="1048" cy="337" r="10" class="cyan pulse"/>
  <circle cx="1262" cy="330" r="10" class="cyan pulse"/>

  <g filter="url(#hard-shadow)">
    <path d="M1084 93H1218L1256 130V258H1084Z" class="paper"/>
    <path d="M1218 93V130H1256" fill="#d8d0c0"/>
    <text x="1112" y="155" class="mono ink">VALID</text>
    <rect x="1114" y="184" width="84" height="9" class="ink"/>
    <rect x="1114" y="207" width="112" height="9" class="ink" opacity=".72"/>
  </g>
  <g filter="url(#hard-shadow)">
    <path d="M1205 65H1328L1365 102V230H1205Z" class="paper"/>
    <path d="M1328 65V102H1365" fill="#d8d0c0"/>
    <text x="1234" y="126" class="mono ink">SIGNED</text>
    <rect x="1237" y="154" width="80" height="9" class="ink"/>
    <rect x="1237" y="177" width="100" height="9" class="ink" opacity=".72"/>
  </g>

  <g transform="translate(1344 258)" filter="url(#hard-shadow)">
    <rect width="182" height="156" fill="#101010" class="stroke-paper"/>
    <text x="24" y="38" class="tiny cyan">CHECKSUM</text>
    <text x="24" y="64" class="tiny cyan">SHA256</text>
    <text x="24" y="96" class="tiny paper">8F3A 7C91</text>
    <text x="24" y="122" class="tiny paper">D6A1 4F60</text>
    <path d="M128 83l16 17 32-45" fill="none" class="stroke-cyan"/>
  </g>

  <g transform="translate(1220 372)">
    <rect width="222" height="62" fill="#090909" class="stroke-paper"/>
    <rect x="18" y="16" width="34" height="34" fill="none" class="stroke-oxide"/>
    <path d="M18 16l17-10 17 10M18 50l17 10 17-10" fill="none" class="stroke-oxide"/>
    <text x="72" y="27" class="tiny paper">BUILT FOR CONTROLLED</text>
    <text x="72" y="50" class="tiny paper">ENVIRONMENTS</text>
  </g>

  <text x="905" y="226" class="tiny cyan">VALIDATE</text>
  <path d="M1002 232l44 68" fill="none" class="stroke-cyan"/>
  <text x="1188" y="296" class="tiny cyan">LINEARIZE</text>
  <path d="M1178 300l70 20" fill="none" class="stroke-cyan"/>
  <text x="1134" y="438" class="tiny cyan">OPTIMIZE</text>
  <path d="M1112 426l58-10" fill="none" class="stroke-cyan"/>
</svg>
