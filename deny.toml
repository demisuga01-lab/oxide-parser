[advisories]
version = 2
yanked = "warn"
# RustCrypto `rsa` has no fixed upgrade for RUSTSEC-2023-0071 as of this
# hardening pass. Oxide documents this in docs/security/crypto_review.md and
# keeps it as an explicit, reviewable exception rather than a silent failure.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
version = 2
confidence-threshold = 0.8
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "IJG",
    "MIT",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
