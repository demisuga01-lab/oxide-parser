name: Private continuous fuzzing

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly deep run. Keep PR fuzzing short; let this job accumulate coverage.
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: Seconds per target for the timed fuzz phase
        required: false
        default: "900"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DEEP_FUZZ_SECONDS: "900"
  FUZZ_MAX_LEN: "65536"

jobs:
  fuzz:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'schedule' && 180 || 45 }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - parse_pdf
          - filters
          - predictor
          - content_tokenizer
          - image_decoders
          - fonts
          - cmap
          - crypto
          - functions
          - writer
          - document_rewrite
          - linearize
          - pdfa
          - editing
          - signature_validation
          - structured_pdf

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install nightly Rust
        run: rustup toolchain install nightly --profile minimal

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: cargo-fuzz-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            cargo-fuzz-${{ runner.os }}-

      - name: Restore persistent fuzz corpus
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Install cargo-fuzz
        run: |
          if ! cargo fuzz --version >/dev/null 2>&1; then
            cargo install cargo-fuzz --locked
          fi

      - name: Replay committed regression corpus
        run: python scripts/ci_fuzz.py --targets "${{ matrix.target }}" --mode regression

      - name: Time-boxed fuzz run
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            seconds="${DEEP_FUZZ_SECONDS}"
          else
            seconds="${{ inputs.fuzz_seconds }}"
          fi
          python scripts/ci_fuzz.py \
            --targets "${{ matrix.target }}" \
            --mode deep \
            --seconds "${seconds}" \
            --max-len "${FUZZ_MAX_LEN}" \
            --no-build

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            target/ci-fuzz-artifacts/${{ matrix.target }}
            fuzz/artifacts/${{ matrix.target }}

      - name: Upload scheduled corpus snapshot
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          if-no-files-found: ignore
          path: fuzz/corpus/${{ matrix.target }}

      - name: Save persistent fuzz corpus
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
