name: Property Tests

on:
  pull_request:
    paths:
      - "crates/engine/**"
      - ".github/workflows/property-tests.yml"
  push:
    branches: [main]
    paths:
      - "crates/engine/**"
      - ".github/workflows/property-tests.yml"
  schedule:
    - cron: "23 5 * * 0"
  workflow_dispatch:
    inputs:
      cases:
        description: "PROPTEST_CASES for the heavy run"
        required: false
        default: "512"

permissions:
  contents: read

jobs:
  property-tests:
    name: oxide-engine property invariants
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PROPTEST_CASES: ${{ github.event_name == 'pull_request' && '64' || github.event_name == 'push' && '64' || github.event.inputs.cases || '512' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-property-tests-${{ hashFiles('**/Cargo.lock') }}

      - name: Run property tests
        run: cargo test -p oxide-engine --test property_invariants -- --nocapture
