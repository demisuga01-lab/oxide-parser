name: Differential Fuzzing

on:
  pull_request:
    paths:
      - "crates/**"
      - "scripts/differential_fuzz.py"
      - "differential/**"
      - ".github/workflows/differential-fuzz.yml"
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/differential_fuzz.py"
      - "differential/**"
      - ".github/workflows/differential-fuzz.yml"
  schedule:
    - cron: "41 4 * * 0"
  workflow_dispatch:
    inputs:
      cases:
        description: "Number of generated/mutated cases"
        required: false
        default: "200"

permissions:
  contents: read

jobs:
  differential-fuzz:
    name: qpdf/Poppler differential fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CASES: ${{ github.event_name == 'pull_request' && '20' || github.event_name == 'push' && '30' || github.event.inputs.cases || '200' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install reference tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qpdf poppler-utils

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-differential-fuzz-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Oxide CLI
        run: cargo build --bin oxide

      - name: Run differential fuzzing
        run: >
          python scripts/differential_fuzz.py
          --cases "$CASES"
          --oxide target/debug/oxide
          --output target/differential-fuzz

      - name: Upload differential fuzz report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: differential-fuzz-report
          path: target/differential-fuzz
          if-no-files-found: ignore
