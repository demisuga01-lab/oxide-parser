name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-gate:
    name: fmt, test, clippy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        shell: bash
        run: |
          mkdir -p target/ci-logs
          set +e
          cargo test --workspace --locked 2>&1 | tee target/ci-logs/cargo-test.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            message="$(tail -n 80 target/ci-logs/cargo-test.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error title=cargo test failed::$message"
            exit "$status"
          fi

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  security-gate:
    name: cargo-audit and cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install audit tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Check RustSec advisories
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

      - name: Check dependency policy
        run: cargo deny check advisories licenses bans sources
